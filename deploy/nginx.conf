user  nginx;
worker_processes  auto;

# ngx_http_acme_module is built into nginx:mainline-alpine >= 1.29.0
load_module modules/ngx_http_acme_module.so;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    # Docker embedded DNS resolver
    resolver        127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Shared memory zone for ACME challenge tokens across workers
    acme_shared_zone zone=acme:1m;

    acme_issuer letsencrypt {
        uri                   https://acme-v02.api.letsencrypt.org/directory;
        challenge             http-01;
        state_path            /var/cache/nginx/acme;
        accept_terms_of_service;
    }

    server {
        listen 80;
        server_name demo.matrixhub.ai;
        server_tokens off;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name demo.matrixhub.ai;
        server_tokens off;

        acme_certificate      letsencrypt;
        ssl_certificate       $acme_certificate;
        ssl_certificate_key   $acme_certificate_key;
        ssl_certificate_cache max=2;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        location / {
            proxy_pass http://matrixhub-apiserver:3001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            # Required for WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;

            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 0;
        }
    }
}
