syntax = "proto3";

package matrixhub.v1alpha1;

option go_package = "github.com/matrixhub-ai/matrixhub/api/go/v1alpha1;v1alpha1";

import "google/api/annotations.proto";
import "v1alpha1/utils.proto";
import "v1alpha1/registry.proto";

service SyncPolicy {
  // ListSyncPolicies lists all sync policies.
  rpc ListSyncPolicies(ListSyncPoliciesRequest) returns (ListSyncPoliciesResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies"
    };
  }
  // GetSyncPolicy gets a sync policy by id.
  rpc GetSyncPolicy(GetSyncPolicyRequest) returns (GetSyncPolicyResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies/{sync_policy_id}"
    };
  }
  // CreateSyncPolicy creates a new sync policy.
  rpc CreateSyncPolicy(CreateSyncPolicyRequest) returns (CreateSyncPolicyResponse) {
    option (google.api.http) = {
      post: "/api/v1alpha1/sync-policies"
      body: "*"
    };
  }
  // UpdateSyncPolicy updates a sync policy.
  rpc UpdateSyncPolicy(UpdateSyncPolicyRequest) returns (UpdateSyncPolicyResponse) {
    option (google.api.http) = {
      put: "/api/v1alpha1/sync-policies/{sync_policy_id}"
      body: "*"
    };
  }
  rpc UpdateSyncPolicySwitch(UpdateSyncPolicySwitchRequest) returns (UpdateSyncPolicySwitchResponse) {
    option (google.api.http) = {
      put: "/api/v1alpha1/sync-policies/{sync_policy_id}/switch"
      body: "*"
    };
  }
  // DeleteSyncPolicy deletes a sync policy.
  rpc DeleteSyncPolicy(DeleteSyncPolicyRequest) returns (DeleteSyncPolicyResponse) {
    option (google.api.http) = {
      delete: "/api/v1alpha1/sync-policies/{sync_policy_id}"
    };
  }
  // CreateSyncTask creates a new sync task.
  rpc CreateSyncTask(CreateSyncTaskRequest) returns (CreateSyncTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks"
    };
  }
  // ListSyncTasks lists all sync tasks.
  rpc ListSyncTasks(ListSyncTasksRequest) returns (ListSyncTasksResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks"
    };
  }
    // GetSyncTask gets a sync task by id.
  rpc GetSyncTask(GetSyncTaskRequest) returns (GetSyncTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks/{sync_task_id}"
    };
  }
  // StopSyncTask stops a sync task.
  rpc StopSyncTask(StopSyncTaskRequest) returns (StopSyncTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks/{sync_task_id}/stop"
    };
  }
  // ListSyncJobs lists all sync jobs.
  rpc ListSyncJobs(ListSyncJobsRequest) returns (ListSyncJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks/{sync_task_id}/sync-jobs"
    };
  }
  // GetSyncJobLog gets the log of a sync job.
  rpc GetSyncJobLog(GetSyncJobLogRequest) returns (GetSyncJobLogResponse) {
    option (google.api.http) = {
      get: "/api/v1alpha1/sync-policies/{sync_policy_id}/sync-tasks/{sync_task_id}/sync-jobs/{sync_job_id}/log"
    };
  }
}

enum SyncPolicyType {
    SYNC_POLICY_TYPE_UNSPECIFIED = 0;
    SYNC_POLICY_TYPE_PULL_BASE = 1;
    SYNC_POLICY_TYPE_PUSH_BASE = 2;
}

enum ResourceType {
    RESOURCE_TYPE_UNSPECIFIED = 0;
    RESOURCE_TYPE_MODEL = 1;
    RESOURCE_TYPE_DATASET = 2;
}

message PullBasePolicy {
  uint32 source_registry_id = 1;
  string resource_name = 2;
  repeated ResourceType resource_types = 3;
  // post or put do not require this field.
  Registry source_registry = 4;
  string target_project_name = 5;
}

message PushBasePolicy {
  string resource_name = 1;
  repeated ResourceType resource_types = 2;
  uint32 target_registry_id = 3;
  Registry target_registry = 4;
  string target_project_name = 5;
}

enum TriggerType {
  TRIGGER_TYPE_UNSPECIFIED = 0;
  TRIGGER_TYPE_MANUAL = 1;
  TRIGGER_TYPE_SCHEDULED = 2;
}

message SyncPolicyItem {
    int32 id = 1;
    string name = 2;
    string description = 3;
    SyncPolicyType policy_type = 4;
    TriggerType trigger_type = 5;
    oneof policy {
      PullBasePolicy pull_base_policy = 6;
      PushBasePolicy push_base_policy = 7;
    }
    // The bandwidth to use for the sync policy.
    string bandwidth = 8;
    bool is_overwrite = 9;
    bool is_disabled = 10;
    TriggerTypeSchedule trigger_type_schedule = 11;
}

message CreateSyncPolicyRequest {
  string name = 1;
  string description = 2;
  SyncPolicyType policy_type = 3;
  TriggerType trigger_type = 4;
  // The policy to use for the sync policy.
  // only one of pull_base_policy or push_base_policy should be set.
  oneof policy {
    PullBasePolicy pull_base_policy = 5;
    PushBasePolicy push_base_policy = 6;
  }
  // The bandwidth to use for the sync policy.
  string bandwidth = 7;
  bool is_overwrite = 8;
  TriggerTypeSchedule trigger_type_schedule = 9;
}

message TriggerTypeSchedule {
  string cron = 1;
}

message CreateSyncPolicyResponse {
  SyncPolicyItem sync_policy = 1;
}


message UpdateSyncPolicyRequest {
  int32 sync_policy_id = 1;
  string name = 2;
  string description = 3;
  TriggerType trigger_type = 4;
  // The policy to use for the sync policy.
  // only one of pull_base_policy or push_base_policy should be set.
  oneof policy {
    PullBasePolicy pull_base_policy = 5;
    PushBasePolicy push_base_policy = 6;
  }
  // The bandwidth to use for the sync policy.
  string bandwidth = 7;
  bool is_overwrite = 8;
  bool is_disabled = 9;
  TriggerTypeSchedule trigger_type_schedule = 10;
}

message UpdateSyncPolicyResponse {
  SyncPolicyItem sync_policy = 1;
}

message DeleteSyncPolicyRequest {
  int32 sync_policy_id = 1;
}

message DeleteSyncPolicyResponse {
  SyncPolicyItem sync_policy = 1;
}

message ListSyncPoliciesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}

message ListSyncPoliciesResponse {
  repeated SyncPolicyItem sync_policies = 1;
  Pagination pagination = 2;
}

message GetSyncPolicyRequest {
  int32 sync_policy_id = 1;
}

message GetSyncPolicyResponse {
  SyncPolicyItem sync_policy = 1;
}

message CreateSyncTaskRequest {
  int32 sync_policy_id = 1;
}

message CreateSyncTaskResponse {
  int32 id = 1;
}


enum SyncTaskStatus {
  SYNC_TASK_STATUS_UNSPECIFIED = 0;
  SYNC_TASK_STATUS_RUNNING = 1;
  SYNC_TASK_STATUS_SUCCEEDED = 2;
  SYNC_TASK_STATUS_FAILED = 3;
  SYNC_TASK_STATUS_STOPPED = 4;
  SYNC_TASK_STATUS_PENDING = 5;
}

message SyncTask {
  int32 id = 1;
  int32 sync_policy_id = 2;
  TriggerType trigger_type = 3;
  SyncTaskStatus status = 4;
  int64 started_timestamp = 5;
  int64 completed_timestamp = 6;
  int64 total_items = 7;
  int64 successful_items = 8;
  int64 stopped_items = 9;
  int64 failed_items = 10;
}


message ListSyncTasksRequest {
  int32 sync_policy_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  SyncTaskStatus status = 4;
}


message ListSyncTasksResponse {
  repeated SyncTask sync_tasks = 1;
  Pagination pagination = 2;
}

message StopSyncTaskRequest {
  int32 sync_policy_id = 1;
  int32 sync_task_id = 2;
}

message StopSyncTaskResponse {
  SyncTask sync_task = 1;
}


message SyncJob {
  int32 id = 1;
  int32 sync_task_id = 2;
  ResourceType resource_type = 3;
  string resource_name = 4;
  string target_resource_name = 5;
  string action = 6;
  SyncJobStatus status = 7;
  int64 completed_timestamp = 8;
  int64 created_timestamp = 9;
}

enum SyncJobStatus {
  SYNC_JOB_STATUS_UNSPECIFIED = 0;
  SYNC_JOB_STATUS_RUNNING = 1;
  SYNC_JOB_STATUS_SUCCEEDED = 2;
  SYNC_JOB_STATUS_FAILED = 3;
  SYNC_JOB_STATUS_STOPPED = 4;
}

message ListSyncJobsRequest {
  int32 sync_policy_id = 1;
  int32 sync_task_id = 2;
  int32 page = 3;
  int32 page_size = 4;
  SyncJobStatus status = 5;
  ResourceType resource_type = 6;
}

message ListSyncJobsResponse {
  repeated SyncJob sync_jobs = 1;
  Pagination pagination = 2;
}

message GetSyncJobLogRequest {
  int32 sync_policy_id = 1;
  int32 sync_task_id = 2;
  int32 sync_job_id = 3;
}

message GetSyncJobLogResponse {
  string log = 1;
}


message GetSyncTaskRequest {
  int32 sync_policy_id = 1;
  int32 sync_task_id = 2;
}

message GetSyncTaskResponse {
  SyncTask sync_task = 1;
}

message UpdateSyncPolicySwitchRequest {
  int32 sync_policy_id = 1;
  bool is_disabled = 2;
}

message UpdateSyncPolicySwitchResponse {
  SyncPolicyItem sync_policy = 1;
}
